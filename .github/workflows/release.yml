name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.14'
          cache: pip

      - name: Verify tag matches package version
        run: |
          VERSION="$(python -c 'from nwkit import __version__; print(__version__)')"
          test "v${VERSION}" = "${GITHUB_REF_NAME}"

      - name: Install release dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Verify source and tests
        run: |
          ruff check nwkit tests
          pytest tests/ -q

      - name: Build and inspect distributions
        run: |
          python -m build
          python -m twine check dist/*
          check-wheel-contents dist/*.whl

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: distributions
          path: dist/
          if-no-files-found: error

  publish-github-release:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: distributions
          path: dist/

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --verify-tag --generate-notes --title "${GITHUB_REF_NAME}"
